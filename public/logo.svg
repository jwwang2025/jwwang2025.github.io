<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style type="text/css">
      .charcoal { fill: #1E293B; }
      .accent { fill: #7DD3FC; }
      .charcoal-stroke { stroke: #1E293B; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .accent-stroke { stroke: #7DD3FC; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- 圆角正方形外边框 -->
  <rect x="36" y="36" width="440" height="440" rx="92" ry="92" class="charcoal-stroke" style="stroke-width: 5;"/>

  <!-- 左上角装饰 - 几何角标 -->
  <g transform="translate(80, 80)">
    <path d="M 0 40 L 0 0 L 40 0" class="accent-stroke" style="stroke-width: 4;"/>
  </g>

  <!-- 右上角装饰 - 几何角标 -->
  <g transform="translate(432, 80)">
    <path d="M 0 0 L 0 40 L -40 40" class="charcoal-stroke" style="stroke-width: 4;"/>
  </g>

  <!-- 左下角装饰 - 几何角标 -->
  <g transform="translate(80, 432)">
    <path d="M 0 -40 L 0 0 L 40 0" class="charcoal-stroke" style="stroke-width: 4;"/>
  </g>

  <!-- 右下角装饰 - 几何角标 -->
  <g transform="translate(432, 432)">
    <path d="M 0 0 L 0 -40 L -40 -40" class="accent-stroke" style="stroke-width: 4;"/>
  </g>

  <!-- 主视觉图形 - 抽象几何S符号 -->
  <g transform="translate(256, 155)">
    <!-- S形外轮廓 - 上半 -->
    <path d="M -32 -36 
             C -32 -68 8 -68 24 -48
             C 32 -38 32 -28 24 -20
             C 18 -14 10 -12 4 -10" 
          class="charcoal-stroke" style="stroke-width: 6;"/>
    <!-- S形外轮廓 - 下半 -->
    <path d="M -4 10
             C -10 12 -18 14 -24 20
             C -32 28 -32 38 -24 48
             C -8 68 32 68 32 36" 
          class="accent-stroke" style="stroke-width: 6;"/>
    <!-- 中心装饰点 -->
    <circle cx="0" cy="0" r="5" class="accent"/>
  </g>

  <!-- 主文字 Startint -->
  <text x="256" y="275" text-anchor="middle" 
        font-family="Inter, 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="700" 
        font-size="60" 
        letter-spacing="-0.5" 
        class="charcoal">Startint</text>

  <!-- 文字装饰下划线 -->
  <g transform="translate(256, 305)">
    <path d="M -150 0 L -90 0" class="charcoal-stroke" style="stroke-width: 3;"/>
    <circle cx="-78" cy="0" r="4" class="accent"/>
    <path d="M -66 0 L 66 0" class="accent-stroke" style="stroke-width: 3;"/>
    <circle cx="78" cy="0" r="4" class="accent"/>
    <path d="M 90 0 L 150 0" class="charcoal-stroke" style="stroke-width: 3;"/>
  </g>

  <!-- 底部标语/装饰 -->
  <text x="256" y="365" text-anchor="middle" 
        font-family="Inter, 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="400" 
        font-size="18" 
        letter-spacing="4" 
        style="fill: #1E293B; opacity: 0.7;">
    PERSONAL BLOG
  </text>

  <!-- 底部几何装饰组 -->
  <g transform="translate(256, 415)">
    <!-- 左小圆 -->
    <circle cx="-80" cy="0" r="6" class="charcoal"/>
    <!-- 左连线 -->
    <path d="M -68 0 L -32 0" class="charcoal-stroke" style="stroke-width: 2.5;"/>
    <!-- 中心方块（旋转45度） -->
    <rect x="-9" y="-9" width="18" height="18" rx="2" class="accent" transform="rotate(45)"/>
    <!-- 右连线 -->
    <path d="M 32 0 L 68 0" class="charcoal-stroke" style="stroke-width: 2.5;"/>
    <!-- 右小圆 -->
    <circle cx="80" cy="0" r="6" class="charcoal"/>
  </g>

</svg>
